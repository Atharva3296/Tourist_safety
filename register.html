<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tourist Registration</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="auth-container">

<div class="auth-card" style="max-width: 600px;">
    <div class="auth-header">
        <h1>Tourist Registration</h1>
        <p>Please register to access safety services, updates, and emergency support during your travels.</p>
    </div>

    <form id="register-form" class="auth-form" onsubmit="register(event)">
        <div class="form-group">
            <label for="register-name">Full Name:</label>
            <input type="text" id="register-name" placeholder="Enter your full name" required>
        </div>

        <div class="form-group">
            <label for="age">Age:</label>
            <input type="number" id="age" placeholder="Enter your age" required>
        </div>

        <div class="form-group">
            <label for="register-phone">Mobile Number:</label>
            <input type="tel" id="register-phone" placeholder="Enter your mobile number" required>
        </div>

        <div class="form-group">
            <label for="register-email">Email:</label>
            <input type="email" id="register-email" placeholder="Enter your email address" required>
        </div>

        <div class="form-group">
            <label for="location">Current Location:</label>
            <input type="text" id="location" placeholder="Enter your current city/town" required>
        </div>

        <div class="form-group">
            <label for="gender">Gender:</label>
            <select id="gender">
                <option value="" disabled selected>Select gender</option>
                <option value="male">Male</option>
                <option value="female">Female</option>
                <option value="other">Other</option>
            </select>
        </div>

        <div class="form-group">
            <label for="emergency">Emergency Contact:</label>
            <input type="text" id="emergency" placeholder="Enter emergency contact number">
        </div>

        <div class="form-group">
            <label for="register-password">Password:</label>
            <input type="password" id="register-password" placeholder="Enter password" required>
        </div>
        
        <div class="form-group">
            <label for="register-confirm">Confirm Password:</label>
            <input type="password" id="register-confirm" placeholder="Confirm password" required>
        </div>

        <button type="submit" class="btn btn-primary btn-full">Register</button>

        <p class="auth-footer">Already have an account? <a href="index.html">Sign in</a></p>
    </form>
</div>

<script src="script.js"></script>
</body>
</html>
